<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Switcher</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="heading">Color Changer</h1>
      <div class="input-container">
        <button class="random-btn">Random Color</button>
        <input
          id="color-input"
          type="text"
          placeholder="Enter a color or hex (e.g. red or #f0)"
        />
        <button class="apply-btn">Apply Color</button>
      </div>
      <p class="current-color">
        Current Color :<span class="current-color-value"> rgb(206, 228, 230)</span>
      </p>
    </div>
  </body>
  <script src="script.js"></script>
</html>
